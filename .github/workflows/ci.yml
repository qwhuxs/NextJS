name: CI

on:
  push:
    branches: [Lab4]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npm run test


      - run: npx playwright install --with-deps

      - run: npm run build

      - run: npm start &

      - run: npx wait-on http://localhost:3000

      - run: npm run test:e2e